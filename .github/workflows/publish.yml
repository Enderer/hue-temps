name: Publish
on:
  release:
    types: [published]
concurrency:
  group: publish-release
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
      - run: npm ci
      - name: Set package version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Using version: $VERSION from tag: $TAG"
          npm pkg set version="$VERSION"
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-artifact
          path: dist
          if-no-files-found: error
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-artifact
          path: dist
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Pin npm for OIDC publish
        run: npm i -g npm@11.5.1
      - name: Set package version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Using version: $VERSION from tag: $TAG"
          npm pkg set version="$VERSION"
      - name: Ensure no token auth is configured
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
      - name: Publish to npm
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Publishing prerelease to npm with dist-tag next"
            npm publish --ignore-scripts --access public --provenance --tag next
          else
            echo "Publishing release to npm with dist-tag latest"
            npm publish --ignore-scripts --access public --provenance
          fi
